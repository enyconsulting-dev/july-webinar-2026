services:
  - type: web
    name: july-webinar-2026
    env: python
    runtime: python-3.11
    region: oregon
    plan: free
    buildCommand: pip install --upgrade pip && pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://july-webinar-2026.vercel.app
